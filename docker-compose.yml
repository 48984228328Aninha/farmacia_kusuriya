version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: farmacia-kusuriya-db
    environment:
      POSTGRES_DB: farmacia_kusuriya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - farmacia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmacia-kusuriya-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/farmacia_kusuriya
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: true
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-farmacia-kusuriya-receitas}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-1}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - farmacia-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  farmacia-network:
    driver: bridge
